    <figure>
      <img [src]="img" [alt]="alt" />
    </figure>
  </div>
  <div class="card-footer">
    <p class="first-text">
      <span>Kontaktbuch <br /><br /></span>

      <a href="https://github.com/Patyika1986/kontakt-buch">Code</a>

    <p class="last-text">{{ tools }}</p>
  </div>
</div>
